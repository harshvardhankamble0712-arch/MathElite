<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <title>MathElite - Menu</title>
</head>
<body>
    <h2>MATH ELITE</h2>
    <div class="menu-container">
        <button class="btn" onclick="openMode('+')">+</button>
        <button class="btn" onclick="openMode('-')">-</button>
        <button class="btn" onclick="openMode('×')">×</button>
        <button class="btn" onclick="openMode('÷')">÷</button>
    </div>

    <script>
        function openMode(type) {
            window.location.href = "game.html";
        }
    </script>
</body>
</html>
