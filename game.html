<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <title>MathElite - Play</title>
</head>
<body>
    <div class="game-box">
        <div class="question" id="q">Loading...</div>
        <input type="number" class="answer-input" id="ans" placeholder="Answer...">
    </div>

    <script>
        let num1 = Math.floor(Math.random() * 10);
        let num2 = Math.floor(Math.random() * 10);
        document.getElementById('q').innerText = num1 + " + " + num2;
    </script>
</body>
</html>
